name: CD Prod — Shipping Service

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag to apply to the image (e.g. v1.0.0)"
        required: true

jobs:
  build-push-scan:
    name: Build, push & scan
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/fullstack_project/shipping
      image-tag: ${{ inputs.image-tag || github.ref_name }}
      also-tag-latest: true
      validate-tag: true
      dockerfile-context: ./backend/shipping-service
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
